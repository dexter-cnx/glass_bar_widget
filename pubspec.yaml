name: glass_bar
description: A customizable glassmorphism navigation bar for Flutter with horizontal and vertical layouts, pinned or auto-hide panels, and flexible theming.
version: 1.0.0
homepage: https://github.com/dexter-cnx/glass_bar_widget
repository: https://github.com/dexter-cnx/glass_bar_widget
issue_tracker: https://github.com/dexter-cnx/glass_bar_widget/issues
topics:
  - glass
  - flutter
  - navigation-bar
  - glassmorphism

screenshots:
  - description: GlassBar demo animation showing the navigation bar and panel interactions.
    path: doc/media/glass_bar_demo.gif
  - description: GlassBar demo screenshot showing the glassmorphism navigation layout.
    path: doc/media/glass_bar_demo.png

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

