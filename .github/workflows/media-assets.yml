name: media-assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'example/**'
      - 'lib/**'
      - 'tool/media/**'
      - '.github/workflows/media-assets.yml'

permissions:
  contents: write

jobs:
  generate-media:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Android demo
        working-directory: example
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Capture media in Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -no-snapshot-save
          disable-animations: true
          script: bash tool/media/capture_android_emulator.sh

      - name: Generate GIF
        run: bash tool/media/make_demo_gif.sh

      - name: Upload media artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glass-bar-media
          path: |
            docs/media/glass_bar_demo.png
            docs/media/glass_bar_demo.gif
            docs/media/frames

      - name: Commit generated media
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/media/glass_bar_demo.png docs/media/glass_bar_demo.gif
          git diff --cached --quiet && exit 0
          git commit -m "chore(media): refresh generated demo assets"
          git push
